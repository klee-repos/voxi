# Auto-provisioned datasources so Grafana is queryable the moment it boots — Loki + Tempo, cross-linked so a
# log line's traceId jumps to its trace and a span jumps back to its logs.
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      derivedFields:
        # Loki's OTLP ingest stores the log record's trace id as structured metadata `trace_id`.
        # Turn it into a click-through to the trace in Tempo.
        - name: TraceID
          matcherType: label
          matcherRegex: trace_id
          datasourceUid: tempo
          url: "$${__value.raw}"
          urlDisplayLabel: View trace

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        customQuery: true
        query: '{service_namespace="voxi"} | trace_id="$${__span.traceId}"'
      nodeGraph:
        enabled: true
