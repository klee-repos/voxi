# Minimal single-binary Loki on the local filesystem, with native OTLP ingest + structured metadata.
auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Required so OTLP resource/log attributes (traceId, userId, sessionId…) are queryable structured metadata.
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: 168h

analytics:
  reporting_enabled: false
