# cloudbuild.yaml — CI build + push + deploy for all four Voxi backend services (PLAN §3, §4.4, §11).
#
# Pipeline:
#   1. Build the four images (voxi-api, eve-front, eve-poller, podcast-worker) from infra/docker/<svc>/Dockerfile
#      with BUILD CONTEXT = repo root ('.'). Tag each with both $SHORT_SHA and 'latest'.
#   2. Push all images to Artifact Registry.
#   3. Deploy:
#        - voxi-api      → Cloud Run service (public ingress; the ONLY public surface).
#        - eve-front     → Cloud Run service (internal ingress; forwards /eve/* AND /.well-known/workflow/*).
#        - eve-poller    → Cloud Run **Worker Pool** (NON-serverless, always-on, manual scaling) — PLAN §4.4.
#        - podcast-worker→ Cloud Run service (internal; Cloud Tasks target).
#
# The deploy steps shell out to infra/deploy/deploy.sh so there is ONE source of truth for the run flags
# (ingress, the dual /eve/* + /.well-known/workflow/* routing, the always-on poller, secret bindings). CI sets
# VOXI_DEPLOY=1 and passes the resolved image tags through.
#
# Required substitutions (set in the trigger or via --substitutions):
#   _REGION         e.g. us-central1
#   _AR_REPO        Artifact Registry repo, e.g. voxi
#   _RUN_SA         Cloud Run runtime service account email
#   _EVE_FRONT_URL  the eve-front internal URL (poller self-callback target; PLAN §4.4)
# $PROJECT_ID and $SHORT_SHA are provided by Cloud Build.

substitutions:
  _REGION: us-central1
  _AR_REPO: voxi
  _RUN_SA: ''
  _EVE_FRONT_URL: ''

options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true
  machineType: E2_HIGHCPU_8

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/voxi-api:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/voxi-api:latest'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/eve-front:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/eve-front:latest'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/eve-poller:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/eve-poller:latest'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/podcast-worker:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/podcast-worker:latest'

steps:
  # ---- 1. Build (context = repo root) -------------------------------------------------------------
  - id: build-voxi-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - infra/docker/voxi-api/Dockerfile
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/voxi-api:$SHORT_SHA'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/voxi-api:latest'
      - .
    env: ['DOCKER_BUILDKIT=1']

  - id: build-eve-front
    name: gcr.io/cloud-builders/docker
    waitFor: ['-']
    args:
      - build
      - -f
      - infra/docker/eve-front/Dockerfile
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/eve-front:$SHORT_SHA'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/eve-front:latest'
      - .
    env: ['DOCKER_BUILDKIT=1']

  - id: build-eve-poller
    name: gcr.io/cloud-builders/docker
    waitFor: ['-']
    args:
      - build
      - -f
      - infra/docker/eve-poller/Dockerfile
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/eve-poller:$SHORT_SHA'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/eve-poller:latest'
      - .
    env: ['DOCKER_BUILDKIT=1']

  - id: build-podcast-worker
    name: gcr.io/cloud-builders/docker
    waitFor: ['-']
    args:
      - build
      - -f
      - infra/docker/podcast-worker/Dockerfile
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/podcast-worker:$SHORT_SHA'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/podcast-worker:latest'
      - .
    env: ['DOCKER_BUILDKIT=1']

  # ---- 2. Push (the `images:` block also pushes on success; explicit push lets deploy steps wait) ---
  - id: push-all
    name: gcr.io/cloud-builders/docker
    waitFor: ['build-voxi-api', 'build-eve-front', 'build-eve-poller', 'build-podcast-worker']
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        REPO="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}"
        for svc in voxi-api eve-front eve-poller podcast-worker; do
          docker push "$REPO/$svc:$SHORT_SHA"
          docker push "$REPO/$svc:latest"
        done

  # ---- 3. Deploy via the single source of truth (deploy.sh) ---------------------------------------
  # deploy.sh forwards both /eve/* AND /.well-known/workflow/*, and deploys the poller always-on
  # (non-serverless Worker Pool). It is reused here so CI and a manual operator run identical flags.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: ['push-all']
    entrypoint: bash
    args:
      - infra/deploy/deploy.sh
      - --deploy-only
    env:
      - 'VOXI_DEPLOY=1'
      - 'PROJECT_ID=$PROJECT_ID'
      - 'REGION=${_REGION}'
      - 'AR_REPO=${_AR_REPO}'
      - 'IMAGE_TAG=$SHORT_SHA'
      - 'RUN_SA=${_RUN_SA}'
      - 'EVE_FRONT_URL=${_EVE_FRONT_URL}'

timeout: 2400s
