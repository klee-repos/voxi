# Build ONLY the voxi-api image (v1 backend) from the repo-root build context on an amd64 Cloud Build runner,
# and push it to Artifact Registry. Used by infra/deploy/voxi-api-v1.sh.
#   gcloud builds submit --config infra/deploy/cloudbuild.voxi-api.yaml \
#     --substitutions=_IMAGE=<region>-docker.pkg.dev/<proj>/voxi/voxi-api,_SHA=<sha> .
steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-f', 'infra/docker/voxi-api/Dockerfile', '-t', '${_IMAGE}:${_SHA}', '-t', '${_IMAGE}:latest', '.']
images:
  - '${_IMAGE}:${_SHA}'
  - '${_IMAGE}:latest'
options:
  # bun install resolves the whole monorepo (incl. expo/react-native); needs headroom to avoid an OOM (exit 137).
  machineType: E2_HIGHCPU_32
timeout: 1800s
