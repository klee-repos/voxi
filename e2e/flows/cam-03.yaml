# Maestro flow (iOS native, deterministic) — cam-03: the native shutter captures → the event-driven reveal rises.
# The iOS Simulator has no camera, so in the maestro build (EXPO_PUBLIC_TEST_MODE=1) the shutter feeds a bundled
# fixture image through the SAME intake path (app/app/reveal.tsx onShutter → POST /v1/threads). With no band seed
# the deterministic test-BFF returns a PROBABLE reveal; reveal.card + reveal.title rise. This proves the real
# capture→createThread→NDJSON-stream→reveal pipeline on the native binary, not react-native-web.
# Run:  bun run e2e:native:bff &   then   maestro test e2e/flows/cam-03.yaml
appId: com.kvnlee.voxi
---
- launchApp:
    clearState: true
    permissions:
      camera: allow
      microphone: allow
- runFlow:
    when:
      visible:
        text: "Allow"
    commands:
      - tapOn:
          text: "Allow"
- extendedWaitUntil:
    visible:
      id: "camera.shutter"
    timeout: 90000
- tapOn:
    id: "camera.shutter"
- extendedWaitUntil:
    visible:
      id: "reveal.card"
    timeout: 60000
- assertVisible:
    id: "reveal.title"
