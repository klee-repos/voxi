# Maestro flow (iOS native, deterministic) — conv-01: default opens full-screen orb VOICE mode
# (push-to-talk) + a persistent live-mic indicator (plan §10.2 screen 8 / §7 conv-01 row, surface I).
# What this proves on real iOS that web cannot: a real press-and-hold gesture on the mic button drives the
# live-mic indicator on while held and off on release — the native push-to-talk contract. In VOXI_TEST_MODE
# a deterministic voice fixture is fed to the mic so a Voxi turn comes back reproducibly (no live ASR/TTS).
# Run on a Mac w/ Xcode:  maestro test e2e/flows/conv-01.yaml
appId: com.voxi.app
env:
  VOXI_TEST_MODE: "1"
  EMAIL: "qa+conv01@voxi.test"
  OTP: "424242"
---
- launchApp:
    clearState: true
    clearKeychain: true
    permissions:
      camera: allow
      microphone: allow # voice mode requires a granted mic; priming covered by cam-01
    arguments:
      voxiTestSeed: "conv-01"
      voxiVoiceFixture: "conv-greeting" # deterministic utterance played into the mic in test mode
# --- sign in ---
- assertVisible:
    id: "welcome.emailInput"
- tapOn:
    id: "welcome.emailInput"
- inputText: ${EMAIL}
- tapOn:
    id: "welcome.eulaAccept"
- tapOn:
    id: "welcome.ageConfirm"
- tapOn:
    id: "welcome.continueBtn"
- assertVisible:
    id: "welcome.otpInput"
- tapOn:
    id: "welcome.otpInput"
- inputText: ${OTP}
# --- skip first-run priming to the camera, then open the conversation via the app-chrome entry point ---
- runFlow:
    when:
      visible:
        id: "firstRun.meetVoxiNext"
    commands:
      - tapOn:
          id: "firstRun.meetVoxiNext"
      - runFlow:
          when:
            visible:
              id: "firstRun.cameraPrimeAllow"
          commands:
            - tapOn:
                id: "firstRun.cameraPrimeAllow"
      - runFlow:
          when:
            visible:
              id: "firstRun.micPrimeAllow"
          commands:
            - tapOn:
                id: "firstRun.micPrimeAllow"
      - runFlow:
          when:
            visible:
              id: "firstRun.privacyAck"
          commands:
            - tapOn:
                id: "firstRun.privacyAck"
- assertVisible:
    id: "camera.screen"
    timeout: 10000
# "Ask Voxi" opens the full-screen conversation (app-chrome nav id, not a coordinate tap).
- tapOn:
    id: "nav.openConversation"
# --- DEFAULT state: voice mode — the orb + push-to-talk mic button are present, NOT the keyboard input ---
- assertVisible:
    id: "conversation.orb"
    timeout: 10000
- assertVisible:
    id: "conversation.micButton"
- assertNotVisible:
    id: "conversation.textInput"
# Before holding, the live-mic indicator is idle (not visible / not active).
- assertNotVisible:
    id: "conversation.liveMicIndicator"
# --- PUSH-TO-TALK: press and hold the mic; the live-mic indicator must appear WHILE the press is held ---
- longPressOn:
    id: "conversation.micButton"
- assertVisible:
    id: "conversation.liveMicIndicator"
# The deterministic voice fixture round-trips → a Voxi turn comes back with its text transcript (the
# official caption/VoiceOver path), proving the push-to-talk turn completed.
- extendedWaitUntil:
    visible:
      id: "conversation.voxiTurn"
    timeout: 20000
- assertVisible:
    id: "conversation.transcriptText"
