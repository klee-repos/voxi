# Maestro flow (iOS native) — thread-04: collection/retention mechanic surfaces "uncatalogued near you".
# iOS/native-only row (TEST-PLAN §8, surface I; layer A — agentic-flavored but assertions are deterministic).
# The "uncatalogued near you" nudge is a location-driven retention surface that only renders on device (it
# leans on CoreLocation); web has no equivalent. Under VOXI_TEST_MODE the app accepts a seeded location +
# nearby-uncatalogued fixture so the prompt appears deterministically without a real GPS fix. The nudge is
# shown on the threads/collection surface and routes the user into a capture.
# Run on a Mac w/ Xcode:  maestro test e2e/flows/thread-04.yaml
appId: com.kvnlee.voxi
env:
  VOXI_TEST_MODE: "1"
  EMAIL: "qa+thread04@voxi.test"
  OTP: "424242" # deterministic OTP honored only in VOXI_TEST_MODE
---
# Seed an authed user whose location has nearby uncatalogued objects, so the retention nudge is eligible.
- launchApp:
    clearState: true
    arguments:
      voxiTestSeed: "thread-04-near-uncatalogued"
- assertVisible:
    id: "welcome.emailInput"
- tapOn:
    id: "welcome.emailInput"
- inputText: ${EMAIL}
- tapOn:
    id: "welcome.eulaAccept"
- tapOn:
    id: "welcome.ageConfirm"
- tapOn:
    id: "welcome.continueBtn"
- assertVisible:
    id: "welcome.otpInput"
- tapOn:
    id: "welcome.otpInput"
- inputText: ${OTP}
- assertVisible:
    id: "camera.screen"
    timeout: 10000
# Navigate to the collection/threads surface where the retention mechanic lives.
- tapOn:
    id: "nav.threadsTab"
- assertVisible:
    id: "threads.screen"
# The "uncatalogued near you" nudge surfaces on the collection. The threads grid carries the copy on its
# retention banner; Maestro matches the visible serif string. (Substring match so the exact city/count is free.)
- assertVisible:
    id: "threads.grid"
- assertVisible:
    text: ".*[Uu]ncatalogued near you.*"
# The nudge is actionable: it must lead into a capture (the retention loop is "go scan that thing"). The
# collection's capture CTA is the deterministic entry point; tapping it lands on the camera, proving the
# surfaced mechanic actually drives the collect/retention action rather than being a dead label.
- assertVisible:
    id: "threads.captureCta"
- tapOn:
    id: "threads.captureCta"
- assertVisible:
    id: "camera.screen"
    timeout: 10000
- assertVisible:
    id: "camera.shutter"
# No brittle coordinate taps anywhere — every step locates by a registered testId (or the nudge's visible copy).
