# Maestro flow (iOS native, deterministic) — deepdive-01: the Deep Dive PLAYER transport on the real binary.
# Capture (fixture shutter, EXPO_PUBLIC_TEST_MODE=1) → reveal. Since REVEAL-STREAMING F2 the Deep Dive AUTO-STARTS
# at the first grounded fact (mode=min) — so by the time we open the player the episode is already composing/ready,
# NOT sitting behind an idle Generate CTA. We wait for the dock icon's "ready to play" label (the auto-start done),
# open the player → the scrubber (the ready episode), then the TRANSPORT REGRESSION: tapping Play flips the control
# to "Pause" and it STICKS, real playback advances the elapsed clock off 0:00, and tapping Pause flips back to "Play"
# and STICKS — i.e. the reported native bug (play didn't work / "stop just restarts play") is fixed. `playing` is user
# INTENT now; it is no longer mirrored from TrackPlayer's async PlaybackState (that mirror was the feedback loop that
# fought the tap). The test-BFF returns a ready episode with a real (silent) audio the native player loads + plays.
# (The previous flow tapped a manual `podcast.generate` CTA — removed: the auto-start means the player lands on the
#  composing/ready episode directly, so the manual CTA is no longer the path this flow exercises.)
# Run:  bun e2e/native/test-bff.ts &   then   maestro test e2e/flows/deepdive-01.yaml
appId: com.kvnlee.voxi
---
- launchApp:
    clearState: true
    permissions:
      camera: allow
      microphone: allow
- runFlow:
    when:
      visible:
        text: "Allow"
    commands:
      - tapOn:
          text: "Allow"
- extendedWaitUntil:
    visible:
      id: "camera.shutter"
    timeout: 90000
- tapOn:
    id: "camera.shutter"
- extendedWaitUntil:
    visible:
      id: "reveal.card"
    timeout: 90000
# F2 (auto-start): the Deep Dive AUTO-STARTED at the first fact with NO Generate tap — the dock icon's accessibility
# label reaches "ready to play" on its own. Wait for that, then open the player.
- extendedWaitUntil:
    visible:
      text: "Deep Dive — ready to play its story"
    timeout: 60000
# Open the Deep Dive player from the reveal dock (now ready, not idle).
- tapOn:
    id: "reveal.deepDiveIcon"
# The ready player (the auto-started episode) — the scrubber, NOT the old idle Generate CTA.
- extendedWaitUntil:
    visible:
      id: "podcast.scrubber"
    timeout: 90000
# The Spotify transport rendered.
- assertVisible:
    id: "podcast.playPause"
- assertVisible:
    id: "podcast.skip15"
- assertVisible:
    id: "podcast.skipBack"
# PLAY → the control flips to "Pause" and STICKS across successive checks (the old hardware-mirror bounced it
# back to "Play" via TrackPlayer's async PlaybackState — that feedback loop is gone; `playing` is intent only).
- tapOn:
    id: "podcast.playPause"
- assertVisible:
    text: "Pause"
- assertVisible:
    text: "Pause"
# Real playback advances — the elapsed clock leaves 0:00 (proven audibly in the device log: rate 1.0, position
# 0 → ~30s). A literal `notVisible "0:00"` is Maestro-robust (its text matcher treats a range regex literally).
- extendedWaitUntil:
    notVisible:
      text: "0:00"
    timeout: 20000
# PAUSE → flips back to "Play" and STICKS — the reported "stop just restarts play" is fixed.
- tapOn:
    id: "podcast.playPause"
- assertVisible:
    text: "Play"
- assertVisible:
    text: "Play"
# ±15 skip is present + tappable without breaking the player (seek logic proven deterministically on the web tier).
- tapOn:
    id: "podcast.skipBack"
- assertVisible:
    id: "podcast.player"
