# Maestro flow (iOS native, deterministic) — auth-01: a launched maestro build lands the authed session on the
# camera. The maestro build ships an empty Clerk key + EXPO_PUBLIC_TEST_USER, so FakeAuth starts signed-in as
# test:<user> and app/app/index.tsx redirects straight to the camera — no welcome/OTP to drive (the real Clerk
# email→OTP journey is covered by the web tier; this proves the native authed landing).
# Run:  bun run e2e:native:bff &   then   maestro test e2e/flows/auth-01.yaml
appId: com.kvnlee.voxi
---
- launchApp:
    clearState: true
    permissions:
      camera: allow
      microphone: allow
# The camera page mounts the real camera view → iOS may still raise the OS permission dialog on a clean install;
# answer it the way a user does (the only sanctioned non-testID matcher — system UI outside our app).
- runFlow:
    when:
      visible:
        text: "Allow"
    commands:
      - tapOn:
          text: "Allow"
- extendedWaitUntil:
    visible:
      id: "camera.shutter"
    timeout: 90000
